<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Лирический — #Уебан #Мирный</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: black;
            font-family: 'Courier New', 'Monaco', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, rgba(100, 100, 130, 0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(140, 140, 170, 0.08) 0%, transparent 55%),
                        linear-gradient(135deg, #050505 0%, #0a0a0f 50%, #000000 100%);
            z-index: 0;
            pointer-events: none;
            animation: slowBreathing 18s infinite alternate;
        }

        @keyframes slowBreathing {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.04"/></svg>');
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .card {
            position: relative;
            z-index: 2;
            max-width: 780px;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(180, 180, 210, 0.3);
            border-radius: 56px;
            padding: 35px 30px 40px 30px;
            box-shadow: 0 0 60px rgba(100, 100, 140, 0.25);
            overflow: visible;
        }

        .avatar-block {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
            overflow: visible;
        }
        .avatar-relative {
            position: relative;
            display: inline-block;
            overflow: visible;
        }
        .avatar-base {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid rgba(220, 220, 255, 0.9);
            box-shadow: 0 0 35px rgba(150, 150, 220, 0.6);
            background: #0a0a0a;
            display: block;
            position: relative;
            z-index: 1;
        }
        .angry-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 165px;
            height: 165px;
            object-fit: contain;
            pointer-events: none;
            animation: angryPulse 0.9s infinite alternate;
            z-index: 20;
            border-radius: 0;
        }

        @keyframes angryPulse {
            0% { opacity: 0.85; transform: translate(-50%, -50%) scale(0.96); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.06); }
        }

        .nick-online {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 10px 0 8px;
        }
        .nick-name {
            font-size: 2.3rem;
            font-weight: bold;
            color: #f0f0f0;
            letter-spacing: 3px;
        }
        .online-dot {
            width: 14px;
            height: 14px;
            background-color: #2ecc2e;
            border-radius: 50%;
            box-shadow: 0 0 6px #2ecc2e;
            animation: blink 1.2s infinite;
        }
        @keyframes blink {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .telegram-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tg-icon {
            width: 24px;
            height: 24px;
            filter: invert(1);
            opacity: 0.8;
        }
        .tg-link {
            color: #bbbbdd;
            text-decoration: none;
            font-size: 1rem;
            border-bottom: 1px dashed #666;
        }

        .hashtags {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0 25px;
            flex-wrap: wrap;
        }
        .hashtags span {
            color: #bcbcbc;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 6px 20px;
            border-radius: 40px;
        }
        .hashtags span:first-child { color: #ffaaaa; border-left: 2px solid #ff8888; }
        .hashtags span:last-child { color: #aaffaa; border-left: 2px solid #88ff88; }

        .track-cover {
            width: 190px;
            height: 190px;
            margin: 10px auto 15px;
            border-radius: 35px;
            overflow: hidden;
            border: 2px solid rgba(255,255,240,0.4);
            box-shadow: 0 0 35px rgba(130,130,180,0.6);
        }
        .track-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-info {
            text-align: center;
            margin-bottom: 15px;
        }
        .track-name {
            font-size: 2rem;
            font-weight: bold;
            color: #f5f5ff;
        }
        .track-artist {
            font-size: 1rem;
            color: #c0c0d0;
            margin-top: 5px;
        }

        .player-container {
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 18px 24px;
            margin: 15px 0 12px;
        }
        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 65px;
            margin-bottom: 15px;
        }
        .wave-bar {
            width: 6px;
            background: #aa88ff;
            border-radius: 3px;
            transition: height 0.05s ease;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .play-pause {
            background: #aa88ff;
            border: none;
            color: black;
            font-size: 1.3rem;
            font-weight: bold;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
        }
        .seek-bar {
            flex: 1;
            height: 5px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 5px;
        }
        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ccbbff;
            border-radius: 50%;
            cursor: pointer;
        }
        .time {
            color: #aaa;
            font-size: 0.85rem;
            min-width: 100px;
            text-align: right;
        }

        /* Блок кентов — без смайлов, расширенный, карточки шире и по бокам */
        .kents-section {
            margin: 25px 0 20px;
            text-align: center;
        }
        .kents-title {
            font-size: 1.6rem;
            letter-spacing: 4px;
            color: #ccccee;
            border-bottom: 1px solid #55556a;
            display: inline-block;
            padding-bottom: 8px;
            margin-bottom: 28px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .kents-list {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            flex-wrap: wrap;
        }
        /* Кликабельная карточка — широкая, разнесена по сторонам */
        .kent-card {
            display: block;
            flex: 1;
            min-width: 240px;
            background: rgba(15, 15, 25, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 56px;
            padding: 28px 20px;
            text-align: center;
            transition: all 0.25s ease;
            border: 1px solid rgba(180, 180, 210, 0.35);
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .kent-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(100, 100, 180, 0.45);
            border-color: rgba(200, 200, 250, 0.9);
            background: rgba(30, 30, 55, 0.85);
        }
        .kent-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #aa88ff;
            background: #1a1a2a;
            box-shadow: 0 0 18px rgba(170, 136, 255, 0.4);
        }
        .kent-name {
            font-size: 1.7rem;
            font-weight: bold;
            color: #f5f5ff;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .kent-username {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.95rem;
            color: #ccddfF;
            font-weight: normal;
            transition: 0.2s;
            margin-top: 6px;
        }
        .kent-card:active {
            transform: scale(0.97);
        }
        .mini-tg-icon {
            width: 18px;
            height: 18px;
            filter: invert(1);
            opacity: 0.9;
        }

        .info-row {
            display: flex;
            justify-content: center;
            margin: 20px 0 12px;
        }
        .info-item {
            background: rgba(20, 20, 35, 0.7);
            padding: 8px 24px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            font-size: 1rem;
            color: #bbbbdd;
            font-family: monospace;
        }

        .tg-btn {
            display: block;
            background: rgba(20, 20, 35, 0.8);
            text-align: center;
            padding: 14px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
            color: #ddddff;
            font-size: 1.2rem;
            border: 1px solid rgba(180, 180, 220, 0.5);
            margin: 15px 0 10px;
        }

        footer {
            text-align: center;
            margin-top: 12px;
            font-size: 0.7rem;
            color: #55556a;
        }

        @media (max-width: 680px) {
            .card { padding: 25px 20px 30px 20px; max-width: 100%; }
            .avatar-base { width: 100px; height: 100px; }
            .angry-overlay { width: 130px; height: 130px; }
            .nick-name { font-size: 1.8rem; }
            .track-name { font-size: 1.6rem; }
            .track-cover { width: 140px; height: 140px; }
            .play-pause { width: 44px; height: 44px; font-size: 1.1rem; }
            .kents-list { gap: 20px; justify-content: center; }
            .kent-card { min-width: 220px; padding: 20px 16px; }
            .kent-avatar { width: 85px; height: 85px; }
            .kent-name { font-size: 1.4rem; }
        }

        @media (max-width: 550px) {
            .kents-list { flex-direction: column; align-items: stretch; gap: 18px; }
            .kent-card { min-width: auto; width: 100%; }
        }
    </style>
</head>

<script>
    const audio = new Audio('Status.mp3');
    audio.preload = 'auto';

    const playBtn = document.getElementById('playPauseBtn');
    const seekBar = document.getElementById('seekBar');
    const timeDisplay = document.getElementById('timeDisplay');
    const waveform = document.getElementById('waveform');

    let bars = [];
    let animationId = null;

    for (let i = 0; i < 40; i++) {
        let bar = document.createElement('div');
        bar.classList.add('wave-bar');
        bar.style.height = '6px';
        waveform.appendChild(bar);
        bars.push(bar);
    }

    audio.addEventListener('timeupdate', () => {
        let percent = (audio.currentTime / audio.duration) * 100;
        seekBar.value = percent;
        let curMin = Math.floor(audio.currentTime / 60);
        let curSec = Math.floor(audio.currentTime % 60);
        let durMin = Math.floor(audio.duration / 60);
        let durSec = Math.floor(audio.duration % 60);
        timeDisplay.innerText = `${curMin}:${curSec.toString().padStart(2,'0')} / ${durMin}:${durSec.toString().padStart(2,'0')}`;
    });

    seekBar.addEventListener('input', () => {
        let time = (seekBar.value / 100) * audio.duration;
        audio.currentTime = time;
    });

    playBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = '⏸';
            startViz();
        } else {
            audio.pause();
            playBtn.innerText = '▶';
        }
    });

    audio.addEventListener('ended', () => {
        playBtn.innerText = '▶';
        stopViz();
        bars.forEach(b => b.style.height = '6px');
    });

    let ctx = null, src = null, analyser = null;

    function startViz() {
        if (ctx) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = ctx.createAnalyser();
        analyser.fftSize = 64;
        src = ctx.createMediaElementSource(audio);
        src.connect(analyser);
        analyser.connect(ctx.destination);
        let data = new Uint8Array(analyser.frequencyBinCount);
        function update() {
            if (!analyser) return;
            analyser.getByteFrequencyData(data);
            for (let i = 0; i < bars.length; i++) {
                let val = data[i] || 0;
                let h = Math.max(6, val / 2);
                bars[i].style.height = `${h}px`;
                bars[i].style.background = `rgb(${120 + val/2}, ${80 + val/3}, 200)`;
            }
            animationId = requestAnimationFrame(update);
        }
        update();
    }

    function stopViz() {
        if (animationId) cancelAnimationFrame(animationId);
        if (ctx) {
            ctx.close().catch(()=>{});
            ctx = null;
            analyser = null;
            src = null;
        }
        bars.forEach(b => {
            b.style.height = '6px';
            b.style.background = '#aa88ff';
        });
    }
</script>
